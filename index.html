<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#818cf8" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="LGS 8. sınıf İngilizce kelime çalışma uygulaması." />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts: Nunito (gövde) + Fredoka (başlık) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Misket" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    
    <!-- Android Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>Misket — LGS İngilizce Kelime</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Only register if not already registered
          navigator.serviceWorker.getRegistration().then((registration) => {
            if (!registration) {
              navigator.serviceWorker.register('/sw.js')
                .then((registration) => {
                  console.log('✅ Service Worker registered successfully:', registration.scope);
                })
                .catch((error) => {
                  console.log('❌ Service Worker registration failed:', error);
                });
            }
          });
        });
      }
    </script>
  </body>
</html>
